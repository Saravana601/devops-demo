name: CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Maven Project
        run: mvn clean package

      - name: Build Docker Image
        run: docker build -t devops-demo -f docker/Dockerfile .