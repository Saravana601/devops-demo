version: "3"

services:

  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: springboot-app
    ports:
      - "8080:8080"
    depends_on:
      - db